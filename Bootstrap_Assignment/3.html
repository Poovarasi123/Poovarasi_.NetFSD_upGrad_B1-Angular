<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">College Events</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Events</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Students</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Event Management Dashboard</h3>


        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addEventModal">
            Add New Event
        </button>
    </div>

    <div class="row g-4">

        <div class="col-12 col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Upcoming Events</h5>
                </div>
                <div class="card-body">

                    <div class="list-group">
                        <div class="list-group-item d-flex justify-content-between align-items-center">
                            Tech Symposium
                            <span class="badge bg-primary">15 March</span>
                        </div>

                        <div class="list-group-item d-flex justify-content-between align-items-center">
                            Cultural Fest
                            <span class="badge bg-success">22 March</span>
                        </div>

                        <div class="list-group-item d-flex justify-content-between align-items-center">
                            Sports Meet
                            <span class="badge bg-warning text-dark">30 March</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-12 col-lg-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body text-center">
                    <h6>Total Events</h6>
                    <h2 class="text-primary">12</h2>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h6>Registered Students</h6>
                    <h2 class="text-success">320</h2>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="addEventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add New Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form class="needs-validation" novalidate>

                    <div class="mb-3">
                        <label class="form-label">Event Name</label>
                        <input type="text" class="form-control" required>
                        <div class="invalid-feedback">
                            Please enter event name.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Event Date</label>
                        <input type="date" class="form-control" required>
                        <div class="invalid-feedback">
                            Please select a date.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Event Category</label>
                        <select class="form-select" required>
                            <option value="">Choose...</option>
                            <option>Technical</option>
                            <option>Cultural</option>
                            <option>Sports</option>
                        </select>
                        <div class="invalid-feedback">
                            Please select category.
                        </div>
                    </div>

                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">
                            Save Event
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')

  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()
</script>

</body>
</html>
